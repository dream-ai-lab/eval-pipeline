# TEMPLATE — copy to paper-registry/<paper_id>/eval_spec.yaml and fill in.
# A SURVEY member completes this; no code needed. Every <...> must be replaced.
# CI validates this file: pinned dataset+model, known metrics, required fields.
spec_version: "1.0.0"
paper_id: "<paper-id>"            # kebab-case, unique
task: "<task-name>"

metric_lib_version: "0.1.0"        # pin — bump only when metric code changes

dataset:
  hf_id: "<org/dataset>"
  config: null                     # HF config name, or null
  split: "<split>"                 # e.g. validation / test
  version: "<x.y.z>"              # human pin (recorded in golden record)
  revision: "<hf-commit-sha>"      # REAL HF commit — never 'main'
  text_field: "<column>"
  label_field: "<column>"

model:
  hf_id: "<org/model>"
  revision: "<hf-commit-sha>"      # REAL HF commit — never 'main'

inference:
  seed: 42
  max_length: 256
  batch_size: 32

metrics:
  primary: "<metric>"              # must exist in eval_lib/metrics.py
  secondary: []                    # optional, all must exist in metric_lib

baseline_scores:
  paper_reported:
    value: <float>
    metric_variant: "<exact variant the paper used>"
    source: "<paper / table>"
  our_reproduce:
    value: null                    # recorded in MLflow, not hand-edited here
    metric_variant: "<metric> (eval_lib 0.1.0)"

reproduce_target:
  <metric>: { min: <float>, max: <float> }
