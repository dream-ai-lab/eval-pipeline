name: ci

# eval_lib's unit tests live in the eval-lib repo now. Here we validate that
# the pinned standard accepts every spec in the paper-registry submodule.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install the standard (pinned)
        run: pip install "git+https://github.com/dream-ai-lab/eval-lib@v0.1.0"
      - name: Validate registry specs
        run: cd paper-registry && python validate.py
