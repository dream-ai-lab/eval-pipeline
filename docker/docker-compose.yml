# The pinned experiment image — one command per experiment. Runs log to
# Weights & Biases (hosted): set WANDB_API_KEY + WANDB_ENTITY to push to the
# team, or WANDB_MODE=offline to run without a network (sync later with
# `wandb sync`). No tracking server to run — W&B is hosted.
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yml run --rm reproduce-sst2
#   docker compose -f docker/docker-compose.yml run --rm proposal-sst2     # needs online W&B
#   docker compose -f docker/docker-compose.yml run --rm reproduce-emotion

x-runner: &runner
  image: eval-pipeline:latest
  build:
    context: ..
    dockerfile: docker/Dockerfile
    args:
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
  environment:
    WANDB_API_KEY: ${WANDB_API_KEY:-}
    WANDB_ENTITY: ${WANDB_ENTITY:-}
    WANDB_PROJECT: ${WANDB_PROJECT:-eval-lib}
    WANDB_MODE: ${WANDB_MODE:-online}
    WANDB_DIR: /wandb
    HF_HOME: /hf-cache
  volumes:
    - hf_cache:/hf-cache
    - wandb_data:/wandb        # offline runs persist here for `wandb sync`

services:
  reproduce-sst2:
    <<: *runner
    command: python experiments/distilbert-sst2/reproduce.py

  proposal-sst2:
    <<: *runner
    command: python experiments/distilbert-sst2/proposal.py

  reproduce-emotion:
    <<: *runner
    command: python experiments/distilbert-emotion/reproduce.py

volumes:
  hf_cache:
  wandb_data:
